[filters.git-remote]
description = "Compact git remote output"
match_command = "^git\\s+remote"
strip_lines_matching = ["^\\s*$"]
max_lines = 10

[[tests.git-remote]]
name = "passthrough for short output"
input = "origin"
expected = "origin"

[[tests.git-remote]]
name = "strips blank lines"
input = "origin\n\nupstream"
expected = "origin\nupstream"
