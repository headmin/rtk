[filters.docker-compose-ps]
description = "Compact docker compose ps output"
match_command = "^docker\\s+compose\\s+ps"
strip_ansi = true
truncate_lines_at = 120
max_lines = 40

[[tests.docker-compose-ps]]
name = "passthrough for table output"
input = "NAME    IMAGE    STATUS\nweb-1   nginx    Up 2h"
expected = "NAME    IMAGE    STATUS\nweb-1   nginx    Up 2h"

[[tests.docker-compose-ps]]
name = "empty input passes through"
input = ""
expected = ""
