[filters.docker-inspect]
description = "Compact docker inspect output"
match_command = "^docker\\s+inspect"
strip_ansi = true
truncate_lines_at = 120
max_lines = 60

[[tests.docker-inspect]]
name = "passthrough for short output"
input = "[\n    {\"Name\": \"/my-container\"}\n]"
expected = "[\n    {\"Name\": \"/my-container\"}\n]"

[[tests.docker-inspect]]
name = "empty input passes through"
input = ""
expected = ""
