[filters.pnpm-build]
description = "Compact pnpm build output (conservative — strips blanks and ANSI only)"
match_command = "^pnpm\\s+build"
strip_ansi = true
strip_lines_matching = ["^\\s*$"]
max_lines = 50

[[tests.pnpm-build]]
name = "strips blank lines, keeps build output"
input = """
> my-app@1.0.0 build
> next build

  ▲ Next.js 14.0.0

✓ Creating an optimized production build
✓ Compiled successfully
✓ Collecting page data
✓ Generating static pages (12/12)

Route (app)              Size     First Load JS
┌ ○ /                   5.2 kB         101 kB
└ ○ /about              3.1 kB          99 kB
"""
expected = "> my-app@1.0.0 build\n> next build\n  ▲ Next.js 14.0.0\n✓ Creating an optimized production build\n✓ Compiled successfully\n✓ Collecting page data\n✓ Generating static pages (12/12)\nRoute (app)              Size     First Load JS\n┌ ○ /                   5.2 kB         101 kB\n└ ○ /about              3.1 kB          99 kB"

[[tests.pnpm-build]]
name = "strips blank lines only"
input = "Building...\n\nDone in 3.2s"
expected = "Building...\nDone in 3.2s"
